<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Worklytics Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../static/css/header.css">
    <link rel="stylesheet" href="../../static/css/change_password.css">
</head>
<body>

    <header class="top-header">
        <div class="header-left">
            <div class="brand-container">
                <img src="../../static/images/worklytics_logo.png" alt="Logo" class="main-logo">
                <span class="brand-name">Worklytics</span>
            </div>
        </div>
    </header>

    <div class="main-layout">
        <aside class="sidebar">
            <div class="user-profile">
                <div class="profile-avatar">
                    <img src="../../static/images/emp_icon.png" alt="User Avatar">
                </div>
                <div class="user-info">
                    <p class="user-name" id="side_name">Loading...</p>
                    <p class="user-role" id="side_role">Employee</p>
                </div>
            </div>

            <nav class="side-nav">
                <ul>
                    <li>
                        <img src="../../static/images/dashboard_icon.png" alt="Dashboard" class="nav-icon-img">
                        <a href="/employee-dashboard">Dashboard</a>
                    </li>
                    <li>
                        <img src="../../static/images/personal_info.png" alt="Personal Information" class="nav-icon-img">
                        <a href="/employee-info">Personal Information</a>
                    </li>
                    <li class="active">
                        <img src="../../static/images/change_pwd.png" alt="Change Password" class="nav-icon-img">
                        <a href="/change-password">Change Password</a>
                    </li>
                </ul>
            </nav>

            <div class="sidebar-footer">
                <div class="logout-link">
                    <span class="nav-icon">🚪</span>
                    <a href="#" id="logoutBtn">Logout</a>
                </div>
            </div>
        </aside>

        <main class="content-body">
            <div class="white-container flush-top">
    <div class="profile-header-section">
        <h2>Security Settings</h2>
        <p>Update your account password to keep your data secure.</p>
    </div>

    <div class="password-form-container">
        <form id="changePasswordForm">
            <div class="form-group">
                <label for="current_password">Current Password</label>
                <input type="password" id="current_password" name="current_password" required placeholder="Enter current password">
            </div>

            <div class="form-group">
                <label for="new_password">New Password</label>
                <input type="password" id="new_password" name="new_password" required placeholder="Min. 8 characters">
                <small class="hint">Use a mix of letters, numbers, and symbols.</small>
            </div>

            <div class="form-group">
                <label for="confirm_password">Confirm New Password</label>
                <input type="password" id="confirm_password" name="confirm_password" required placeholder="Repeat new password">
            </div>

            <div id="messageBox" class="message-box"></div>

            <button type="submit" class="btn-update">Update Password</button>
        </form>
    </div>
</div>
        </main>
    </div>

<script src="../../static/js/change_password.js"></script>
<script src="../../static/js/logout.js"></script>
</body>
</html>
