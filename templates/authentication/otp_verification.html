<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify OTP</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(rgba(0,0,0,0.1), rgba(0,0,0,0.1)),
                        url('../../static/images/login_background.jpg');
            background-size: cover;
            background-position: center;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .brand-wrapper {
            display: flex;
            align-items: center;
            gap: 5px;
            margin-bottom: 10px;
        }

        .brand-logo { height: 100px; }

        .brand-name {
            font-family: 'Dancing Script', cursive;
            font-size: 42px;
            color: #1a1a1a;
        }

        .card {
            background: #fff;
            padding: 50px 40px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            text-align: center;
        }

        h2 { font-size: 30px; margin-bottom: 8px; }
        .subtitle {
            font-size: 12px;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 35px;
        }

        .otp-container {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 30px;
        }

        .otp-input {
            width: 55px;
            height: 60px;
            text-align: center;
            font-size: 22px;
            border: 1px solid #e0e0e0;
            outline: none;
        }

        .otp-input:focus { border-color: #4A6CF7; }

        .verify-btn {
            width: 100%;
            padding: 18px;
            background: #4A6CF7;
            color: white;
            border: none;
            font-weight: 700;
            letter-spacing: 1px;
            cursor: pointer;
        }

        .resend {
            margin-top: 15px;
            font-size: 13px;
            color: #888;
            text-decoration: none;
            display: block;
        }
        .back-link {
            display: block;
            margin-top: 20px;
            font-size: 13px;
            color: #888;
            text-decoration: none;
        }
    </style>
</head>

<body>

<div class="brand-wrapper">
    <img src="../../static/images/worklytics_logo.png" class="brand-logo">
    <span class="brand-name">Worklytics</span>
</div>

<div class="card">
    <h2>OTP Verification</h2>
    <p class="subtitle">Enter the 6-digit code sent to your email</p>

    <form id="otpForm">
        <div class="otp-container">
            <input type="text" maxlength="1" class="otp-input">
            <input type="text" maxlength="1" class="otp-input">
            <input type="text" maxlength="1" class="otp-input">
            <input type="text" maxlength="1" class="otp-input">
            <input type="text" maxlength="1" class="otp-input">
            <input type="text" maxlength="1" class="otp-input">
        </div>

        <button type="submit" class="verify-btn">VERIFY</button>
    </form>

    <a href="" class="resend">Resend OTP</a>
    <a href="/login" class="back-link">Back to Login</a>
</div>

<script src="../../static/js/otp_verification.js"></script>
</body>
</html>
